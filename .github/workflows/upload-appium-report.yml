name: Upload Appium Report

on:
  push:
  workflow_dispatch:

jobs:
  upload-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Appium Report exists
        run: ls -la testing/final-reports/WellCare_Appium_Report.xlsx

      - name: Upload Appium Report
        uses: actions/upload-artifact@v4
        with:
          name: Appium-Report
          path: testing/final-reports/WellCare_Appium_Report.xlsx
