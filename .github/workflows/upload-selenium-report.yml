name: Upload Selenium Report

on:
  push:
  workflow_dispatch:

jobs:
  upload-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Selenium Report exists
        run: ls -la testing/final-reports/WellCare_Selenium_Report.xlsx

      - name: Upload Selenium Report
        uses: actions/upload-artifact@v4
        with:
          name: Selenium-Report
          path: testing/final-reports/WellCare_Selenium_Report.xlsx
